<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LottoSmash 관리자</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f7fb; color: #1f2937; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.card { background: white; border-radius: 14px; padding: 36px 40px; box-shadow: 0 4px 20px rgba(15,23,42,0.10); width: 100%; max-width: 380px; }
h1 { color: #0f4c81; font-size: 22px; margin-bottom: 4px; }
.subtitle { color: #6b7280; font-size: 13px; margin-bottom: 28px; }
label { display: block; font-size: 13px; font-weight: 500; color: #374151; margin-bottom: 5px; }
input { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; margin-bottom: 14px; }
input:focus { outline: none; border-color: #1d4ed8; box-shadow: 0 0 0 2px rgba(29,78,216,0.15); }
.btn { width: 100%; padding: 11px; background: #1d4ed8; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn:hover { background: #1e40af; }
.btn:disabled { background: #93c5fd; cursor: not-allowed; }
.error { color: #dc2626; font-size: 13px; margin-bottom: 10px; display: none; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <h1>🎰 LottoSmash</h1>
  <p class="subtitle">관리자 로그인</p>

  <div class="error" id="errMsg"></div>

  <label>이메일</label>
  <input type="email" id="email" placeholder="admin@example.com" autocomplete="username">

  <label>비밀번호</label>
  <input type="password" id="password" autocomplete="current-password">

  <button class="btn" id="loginBtn" onclick="login()">로그인</button>
</div>

<script>
const API_BASE = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:8080'
  : 'https://lottosmash.mauvemove.com';

async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('errMsg');
  const btn      = document.getElementById('loginBtn');

  errEl.style.display = 'none';
  if (!email || !password) {
    errEl.textContent = '이메일과 비밀번호를 입력하세요.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';

  try {
    const res = await fetch(`${API_BASE}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password }),
    });

    const contentType = res.headers.get('Content-Type') || '';
    let data;

    if (contentType.includes('application/json')) {
      data = await res.json();
    } else {
      data = { error: await res.text() };
    }

    if (!res.ok) {
      throw new Error(data.error || '로그인 실패');
    }

    // 토큰 저장 후 관리자 페이지로 이동
    localStorage.setItem('admin_token', data.access_token);
    window.location.href = `${API_BASE}/admin/support/?token=${encodeURIComponent(data.access_token)}`;
  } catch (e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = '로그인';
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
